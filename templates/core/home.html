{% extends "base.html" %}
{% load static %}

{% block title %}Reyerta{% endblock %}

{% block content %}
<main class="shell">
  <section class="title-screen arcade-title-screen">
    <p class="eyebrow">modo local</p>
    <h1 class="brand-logo">
      <img src="{% static 'img/logo-reyerta.png' %}" alt="REYERTA">
    </h1>
    {% if user.is_authenticated %}
    <p class="session-label">Sesion iniciada: {{ user.username }}</p>
    <div class="arcade-menu-panel">
      <nav class="menu" aria-label="Menu principal">
        <a class="menu-primary" href="{% url 'core:local' %}"><span>Local</span></a>
      </nav>
      <form class="inline-action" action="{% url 'usuarios:logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Cerrar sesion</button>
      </form>
    </div>
    {% else %}
    <div class="menu-panel menu-panel-small">
      <nav class="menu" aria-label="Acceso">
        <a href="{% url 'usuarios:login' %}"><span>Entrar</span></a>
        <a href="{% url 'usuarios:registro' %}"><span>Crear cuenta</span></a>
      </nav>
    </div>
    {% endif %}
  </section>
</main>
{% endblock %}
